<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>261 AREA | ADMIN PANEL</title>
  
  <!-- SCRIPT FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
  
  <style>
    /* =========================================
       CSS ADMIN PANEL - BLACK & WHITE CRT THEME
       ========================================= */
    * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
    
    body {
        background: #000;
        color: #fff;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 10px; 
        min-height: 100vh;
        overflow-x: hidden;
    }

    body::before {
        content: " "; display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        z-index: 9999; background-size: 100% 3px; pointer-events: none;
    }

    .box {
        background: #000;
        border: 2px solid #333;
        padding: 30px 20px;
        width: 100%;
        max-width: 500px;
        z-index: 10;
        position: relative;
        margin-bottom: 20px;
        border-radius: 8px;
    }

    h2 {
        text-align: center;
        margin-top: 0;
        letter-spacing: 4px;
        font-size: 20px;
        text-transform: uppercase;
        border-bottom: 1px dashed #444;
        padding-bottom: 15px;
        margin-bottom: 30px;
        color: #00d2ff;
    }

    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label {
        display: block;
        font-size: 12px;
        margin-bottom: 8px;
        font-weight: bold;
        letter-spacing: 1px;
        color: #ccc;
        text-transform: uppercase;
    }

    input[type="text"], input[type="password"], textarea {
        width: 100%;
        padding: 12px;
        background: #0a0a0a;
        border: 1px solid #333;
        color: #fff;
        outline: none;
        font-size: 14px;
        letter-spacing: 1px;
        transition: border 0.3s;
        border-radius: 4px;
    }
    
    input[type="text"]:focus, input[type="password"]:focus, textarea:focus { border-color: #00d2ff; }

    textarea { resize: vertical; min-height: 120px; }

    input[type="file"] {
        width: 100%;
        padding: 10px;
        background: #0a0a0a;
        border: 1px dashed #444;
        color: #ccc;
        font-size: 12px;
        cursor: pointer;
        transition: border 0.3s;
        border-radius: 4px;
    }
    input[type="file"]:hover { border-color: #00d2ff; }

    .checkbox-group { display: flex; align-items: center; margin-bottom: 25px; }
    .checkbox-group input { width: auto; margin-right: 10px; cursor: pointer; transform: scale(1.2); }
    .checkbox-group label { font-size: 12px; color: #ccc; letter-spacing: 1px; cursor: pointer; font-weight: bold; }

    button {
        width: 100%; padding: 15px; background: transparent; color: #00d2ff; border: 1px solid #00d2ff;
        font-weight: bold; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
        cursor: pointer; transition: all 0.2s ease; margin-top: 10px; border-radius: 4px;
    }
    button:hover { background: #00d2ff; color: #000; }
    button:active { transform: scale(0.98); }

    .btn-danger { border-color: #ff4444; color: #ff4444; }
    .btn-danger:hover { background: #ff4444; color: #000; }

    .footer-text { text-align: center; font-size: 10px; color: #555; margin-top: 25px; letter-spacing: 1px; text-transform: uppercase; }

    #admin-screen { display: none; }

    /* PERBAIKAN POST CARD BIAR GAK TUMPANG TINDIH */
    .admin-post-card { border: 1px solid #333; padding: 20px; margin-top: 20px; background: #0a0a0a; border-radius: 8px; word-wrap: break-word; overflow: hidden;}
    .admin-post-card .date { font-size: 11px; color: #00d2ff; margin-bottom: 15px; font-family: 'Share Tech Mono', monospace; border-bottom: 1px dashed #333; padding-bottom: 10px;}
    .admin-post-card .text { font-size: 14px; color: #eee; margin-bottom: 15px; white-space: pre-wrap; line-height: 1.5; font-family: sans-serif; word-break: break-word;}
    .post-preview-img { width: 100%; height: auto; max-height: 300px; object-fit: contain; border: 1px solid #333; margin-bottom: 10px; border-radius: 4px; background: #000;}
    
    .delete-btn { width: 100%; background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 12px; font-size: 14px; margin-top: 5px; font-family: 'Share Tech Mono', monospace; font-weight: bold;}
    .delete-btn:hover { background: #ff4444; color: #000; }
    
    #poll-container input { margin-bottom: 8px; border-style: dashed; }

    /* CSS MONITOR POLLING */
    .admin-poll-container { margin-bottom: 15px; background: rgba(0,0,0,0.6); border: 1px solid #222; border-radius: 8px; padding: 15px; }
    .admin-poll-header { color: #00d2ff; font-weight: bold; font-size: 12px; margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 8px; display: flex; justify-content: space-between; }
    .admin-poll-row { position: relative; padding: 10px 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; display: flex; justify-content: space-between; align-items: center; overflow: hidden; border: 1px solid #111;}
    .admin-poll-bg { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0, 210, 255, 0.2); z-index: 1; transition: width 0.5s ease; }
    .admin-poll-text { z-index: 2; font-size: 13px; color: #fff; font-family: sans-serif; max-width: 60%; word-break: break-word;}
    .admin-poll-stats { z-index: 2; font-size: 12px; color: #00d2ff; font-weight: bold; font-family: 'Courier New', Courier, monospace;}

    /* CSS KOMENTAR DI ADMIN PANEL */
    .admin-comments-section { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #333; }
    .admin-comment-box { background: transparent; margin-top: 10px; padding: 10px 0; position: relative; border-bottom: 1px solid #111; word-wrap: break-word;}
    .admin-comment-box.reply { margin-left: 20px; border-left: 2px solid #333; padding-left: 15px; border-bottom: none; }
    .admin-comment-author { font-size: 12px; font-weight: bold; color: #0f0; }
    .admin-comment-time { font-size: 10px; color: #666; margin-left: 5px; }
    .admin-comment-text { font-size: 13px; color: #ccc; margin-top: 5px; white-space: pre-wrap; word-break: break-word; font-family: sans-serif; padding-right: 50px;} /* Kasih ruang buat tombol delete */
    .admin-btn-delete-comment { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 5px 10px; font-size: 10px; cursor: pointer; position: absolute; right: 0; top: 5px; border-radius: 4px; font-family: inherit; font-weight: bold;}
    .admin-btn-delete-comment:hover { background: #ff4444; color: #000; }
  </style>
</head>
<body>

  <!-- LAYAR LOGIN -->
  <div class="box" id="login-screen">
    <h2>SYSTEM LOGIN</h2>
    
    <div class="input-group">
        <label>USERNAME</label>
        <input type="text" id="user" placeholder="username" autocomplete="off">
    </div>
    
    <div class="input-group">
        <label>PASSWORD</label>
        <input type="password" id="pass" placeholder="password">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">SIMPAN SESI LOGIN</label>
    </div>
    
    <button onclick="login()">MASUK</button>
    <div class="footer-text">261area ADMIN PROTOCOL</div>
  </div>

  <!-- LAYAR ADMIN UTAMA -->
  <div id="admin-screen" style="width: 100%; display: none; flex-direction: column; align-items: center;">
      <div class="box">
        <h2>UPDATE DATA BARU</h2>
        
        <div class="input-group">
            <label>ISI INFORMASI TERTULIS</label>
            <textarea id="post-content" placeholder="KETIK PESAN DISINI..."></textarea>
        </div>

        <div class="input-group">
            <label>UPLOAD GAMBAR (OPSIONAL)</label>
            <input type="file" id="img-input" accept="image/*">
        </div>

        <!-- SISTEM POLLING -->
        <div class="input-group" style="border: 1px dashed #333; padding: 15px; border-radius: 8px;">
            <label style="color:#0f0;">📊 TAMBAH POLLING (OPSIONAL)</label>
            <div id="poll-container"></div>
            <button type="button" onclick="addPollOption()" style="padding: 10px; font-size: 12px; border: 1px dashed #0f0; color: #0f0; margin-top: 5px; background: transparent;">+ TAMBAH OPSI</button>
        </div>

        <button id="submit-btn" onclick="kirimPost()">KIRIM DATA</button>
        <div class="footer-text">CREATED : NANDO</div>
      </div>

      <div class="box" style="margin-top: 10px; padding: 15px;">
        <h2>POST & KOMENTAR</h2>
        
        <div id="admin-post-list">
            <div class="footer-text">LOADING DATA DARI SERVER...</div>
        </div>
      </div>

      <button class="btn-danger" style="max-width: 500px; margin-bottom: 40px;" onclick="logout()">LOGOUT SYSTEM</button>
  </div>

  <script>
    // CONFIG FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBpa1Ml5i0j5Jzs4eQrHKKIuo3FoB7JWrE",
      authDomain: "clx---14.firebaseapp.com",
      databaseURL: "https://clx---14-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "clx---14",
      storageBucket: "clx---14.firebasestorage.app",
      messagingSenderId: "368765694470",
      appId: "1:368765694470:web:90ef6dbccc7aa5a4adc987"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    window.onload = function() {
        if(localStorage.getItem('admin261_logged_in') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'flex';
            loadAdminPosts(); 
        }
    };

    function login() {
      let u = document.getElementById('user').value;
      let p = document.getElementById('pass').value;
      let remember = document.getElementById('remember-me').checked;

      if(u === '261area' && p === 'petinggi261') {
        if(remember) localStorage.setItem('admin261_logged_in', 'true');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'flex';
        loadAdminPosts(); 
      } else {
        alert('ACCESS DENIED: Kredensial tidak valid!');
      }
    }

    function logout() {
        if(confirm("Yakin mau logout cuy?")) {
            localStorage.removeItem('admin261_logged_in');
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        }
    }

    // Sistem Tambah Opsi Polling
    let pollCount = 0;
    function addPollOption() {
        let div = document.createElement('div');
        div.innerHTML = `<input type="text" id="poll-opt-${pollCount}" placeholder="Opsi Polling ${pollCount + 1}" autocomplete="off">`;
        document.getElementById('poll-container').appendChild(div);
        pollCount++;
    }

    function loadAdminPosts() {
        database.ref('forum_posts').on('value', (snapshot) => {
            let html = '';
            let postsArray = [];
            
            snapshot.forEach(child => { postsArray.push({ key: child.key, ...child.val() }); });
            postsArray.sort((a, b) => b.timestamp - a.timestamp);

            postsArray.forEach(post => {
                let dateObj = new Date(post.timestamp);
                let dateStr = dateObj.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'}) + ' - ' + dateObj.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
                
                // SISTEM MONITOR POLLING (BARU)
                let pollMonitorHtml = '';
                if(post.poll) {
                    let totalVotes = 0;
                    let pollKeys = Object.keys(post.poll);
                    pollKeys.forEach(k => totalVotes += (post.poll[k].votes || 0));

                    pollMonitorHtml += `
                    <div class="admin-poll-container">
                        <div class="admin-poll-header">
                            <span>📊 MONITOR POLLING</span>
                            <span style="color:#fff;">${totalVotes} Suara</span>
                        </div>`;
                        
                    pollKeys.forEach(k => {
                        let opt = post.poll[k];
                        let votes = opt.votes || 0;
                        let pct = totalVotes === 0 ? 0 : Math.round((votes / totalVotes) * 100);
                        
                        pollMonitorHtml += `
                        <div class="admin-poll-row">
                            <div class="admin-poll-bg" style="width: ${pct}%;"></div>
                            <div class="admin-poll-text">${opt.text}</div>
                            <div class="admin-poll-stats">${votes} VOTE (${pct}%)</div>
                        </div>`;
                    });
                    
                    pollMonitorHtml += `</div>`;
                }
                
                // SISTEM RENDER KOMENTAR
                let commentsHtml = '';
                if(post.comments) {
                    commentsHtml += `<div class="admin-comments-section"><div style="font-size:12px; color:#00d2ff; margin-bottom:10px; font-weight:bold;">KOMENTAR MASUK:</div>`;
                    let commentsList = [];
                    for(let cKey in post.comments) { commentsList.push({id: cKey, ...post.comments[cKey]}); }
                    
                    commentsList.sort((a,b) => a.timestamp - b.timestamp).forEach(c => {
                        let isRep = c.replyTo ? 'reply' : '';
                        let cDate = new Date(c.timestamp).toLocaleString('id-ID');
                        commentsHtml += `
                        <div class="admin-comment-box ${isRep}">
                            <span class="admin-comment-author">${c.author}</span> 
                            <span class="admin-comment-time">[${cDate}]</span>
                            ${c.replyTo ? `<span style="color:#ffeb3b; font-size:10px;"> [Replying]</span>` : ''}
                            <div class="admin-comment-text">${c.text}</div>
                            <button class="admin-btn-delete-comment" onclick="deleteComment('${post.key}', '${c.id}')">HAPUS</button>
                        </div>`;
                    });
                    commentsHtml += `</div>`;
                }

                html += `
                <div class="admin-post-card">
                    <div class="date">[ ID: ${post.key} ]<br>[ ${dateStr} WIB ]</div>
                    ${post.image ? `<img src="${post.image}" class="post-preview-img">` : ''}
                    
                    <div class="text">${post.content ? post.content : '(Tanpa Teks / Hanya Gambar atau Poll)'}</div>
                    
                    ${pollMonitorHtml}
                    ${commentsHtml}

                    <button class="delete-btn" style="margin-top:20px;" onclick="hapusPost('${post.key}')">HAPUS POSTINGAN INI</button>
                </div>`;
            });

            if(html === '') html = '<div class="footer-text">BELUM ADA DATA DI SERVER</div>';
            document.getElementById('admin-post-list').innerHTML = html;
        });
    }

    window.hapusPost = function(key) {
        if(confirm("WARNING: Yakin mau hapus POSTINGAN INI beserta seluruh komentar & pollingnya dari server?")) {
            database.ref('forum_posts/' + key).remove()
            .then(() => alert("SUCCESS: Data terhapus permanen!"))
            .catch(e => alert("FAILED: " + e));
        }
    }

    // Fungsi Hapus Komentar Individual
    window.deleteComment = function(postKey, commentId) {
        if(confirm("Yakin mau hapus komentar anonim ini?")) {
            database.ref(`forum_posts/${postKey}/comments/${commentId}`).remove()
            .then(() => console.log("Komentar dihapus."))
            .catch(e => alert("Error: " + e));
        }
    };

    let imageBase64 = "";
    document.getElementById('img-input').addEventListener('change', function(e) {
      let file = e.target.files[0];
      if(!file) return;
      let reader = new FileReader();
      reader.onload = function(event) {
        let img = new Image();
        img.onload = function() {
          let canvas = document.createElement('canvas');
          let MAX_WIDTH = 600; 
          let scaleSize = MAX_WIDTH / img.width;
          canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
          let ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          imageBase64 = canvas.toDataURL('image/jpeg', 0.6); 
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    function kirimPost() {
      let content = document.getElementById('post-content').value;
      
      // Kumpulin Data Polling
      let pollData = null;
      if(pollCount > 0) {
          let hasValidOption = false;
          pollData = {};
          for(let i=0; i<pollCount; i++) {
              let el = document.getElementById(`poll-opt-${i}`);
              if(el && el.value.trim() !== "") {
                  pollData[`opt_${i}`] = { text: el.value.trim(), votes: 0 };
                  hasValidOption = true;
              }
          }
          if(!hasValidOption) pollData = null;
      }

      if(!content && !imageBase64 && !pollData) return alert('ERROR: Masukin pesan, gambar, atau opsi polling dulu cuy!');

      let btn = document.getElementById('submit-btn');
      btn.innerText = "TRANSMITTING..."; btn.disabled = true;

      database.ref('forum_posts').push({
        content: content,
        image: imageBase64,
        poll: pollData,
        timestamp: Date.now() 
      }).then(() => {
        alert('SUCCESS: Data terkirim ke server 261 Area!');
        document.getElementById('post-content').value = '';
        document.getElementById('img-input').value = '';
        document.getElementById('poll-container').innerHTML = ''; // Reset Polling
        pollCount = 0;
        imageBase64 = '';
        btn.innerText = "KIRIM DATA"; btn.disabled = false;
      }).catch(e => {
        alert('FAILED: ' + e);
        btn.innerText = "KIRIM DATA"; btn.disabled = false;
      });
    }

    document.getElementById('pass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
