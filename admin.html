<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>261 AREA</title>
  
  <!-- SCRIPT FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
  
  <style>
    /* =========================================
       CSS ADMIN PANEL - BLACK & WHITE CRT THEME
       ========================================= */
    * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
    
    body {
        background: #000;
        color: #fff;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 10px; 
        min-height: 100vh;
        overflow-x: hidden;
    }

    body::before {
        content: " "; display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        z-index: 9999; background-size: 100% 3px; pointer-events: none;
    }

    .box {
        background: #000;
        border: 2px solid #fff;
        padding: 40px 30px;
        width: 100%;
        max-width: 450px;
        z-index: 10;
        position: relative;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        margin-bottom: 20px;
    }

    h2 {
        text-align: center;
        margin-top: 0;
        letter-spacing: 4px;
        font-size: 24px;
        text-transform: uppercase;
        border-bottom: 2px dashed #fff;
        padding-bottom: 15px;
        margin-bottom: 30px;
        text-shadow: 0 0 5px #fff;
    }

    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label {
        display: block;
        font-size: 12px;
        margin-bottom: 8px;
        font-weight: bold;
        letter-spacing: 1px;
        color: #ccc;
        text-transform: uppercase;
    }

    input[type="text"], input[type="password"], textarea {
        width: 100%;
        padding: 12px;
        background: #000;
        border: 1px solid #555;
        color: #fff;
        outline: none;
        font-size: 14px;
        letter-spacing: 1px;
        transition: border 0.3s;
    }
    
    input[type="text"]:focus, input[type="password"]:focus, textarea:focus { border-color: #fff; }

    textarea { resize: vertical; min-height: 120px; }

    input[type="file"] {
        width: 100%;
        padding: 10px;
        background: #111;
        border: 1px dashed #555;
        color: #ccc;
        font-size: 12px;
        cursor: pointer;
        transition: border 0.3s;
    }
    input[type="file"]:hover { border-color: #fff; }

    .checkbox-group { display: flex; align-items: center; margin-bottom: 25px; }
    .checkbox-group input { width: auto; margin-right: 10px; cursor: pointer; transform: scale(1.2); }
    .checkbox-group label { font-size: 12px; color: #ccc; letter-spacing: 1px; cursor: pointer; font-weight: bold; }

    button {
        width: 100%; padding: 15px; background: #000; color: #fff; border: 2px solid #fff;
        font-weight: bold; font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
        cursor: pointer; transition: all 0.2s ease; margin-top: 10px;
    }
    button:hover { background: #fff; color: #000; box-shadow: 0 0 10px #fff; }
    button:active { transform: scale(0.98); }

    .btn-danger { border-color: #ff4444; color: #ff4444; }
    .btn-danger:hover { background: #ff4444; color: #000; box-shadow: 0 0 10px #ff4444; }

    .footer-text { text-align: center; font-size: 10px; color: #555; margin-top: 25px; letter-spacing: 1px; text-transform: uppercase; }

    #admin-screen { display: none; }

    .admin-post-card { border: 1px dashed #555; padding: 15px; margin-top: 15px; background: rgba(20, 20, 20, 0.5); }
    .admin-post-card .date { font-size: 10px; color: #888; margin-bottom: 10px; letter-spacing: 1px; }
    .admin-post-card .text { font-size: 13px; color: #ccc; margin-bottom: 10px; white-space: pre-wrap; line-height: 1.5; }
    .post-preview-img { width: 100%; border: 1px solid #333; margin-bottom: 10px; }
    
    .delete-btn { width: 100%; background: #000; color: #fff; border: 1px dashed #fff; padding: 10px; font-size: 12px; margin-top: 5px; }
    .delete-btn:hover { background: #fff; color: #000; font-weight: bold; }
    
    #poll-container input { margin-bottom: 8px; border-style: dashed; }
  </style>
</head>
<body>

  <!-- LAYAR LOGIN -->
  <div class="box" id="login-screen">
    <h2>PANEL LOGIN</h2>
    
    <div class="input-group">
        <label>USERNAME</label>
        <input type="text" id="user" placeholder="username" autocomplete="off">
    </div>
    
    <div class="input-group">
        <label>PASSWORD</label>
        <input type="password" id="pass" placeholder="password">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">SIMPAN SESI LOGIN</label>
    </div>
    
    <button onclick="login()">MASUK</button>
    <div class="footer-text">261area</div>
  </div>

  <!-- LAYAR ADMIN UTAMA -->
  <div id="admin-screen" style="width: 100%; display: none; flex-direction: column; align-items: center;">
      <div class="box">
        <h2>UPDATE DATA</h2>
        
        <div class="input-group">
            <label>ISI INFORMASI TERTULIS</label>
            <textarea id="post-content" placeholder="KETIK PESAN DISINI..."></textarea>
        </div>

        <div class="input-group">
            <label>UPLOAD GAMBAR (OPSIONAL)</label>
            <input type="file" id="img-input" accept="image/*">
        </div>

        <!-- SISTEM POLLING -->
        <div class="input-group" style="border: 1px solid #333; padding: 15px; background: #0a0a0a;">
            <label style="color:#0f0;">📊 TAMBAH POLLING (OPSIONAL)</label>
            <div id="poll-container"></div>
            <button type="button" onclick="addPollOption()" style="padding: 10px; font-size: 12px; border: 1px dashed #0f0; background: transparent; color: #0f0; margin-top: 5px;">+ TAMBAH OPSI POLLING</button>
        </div>

        <button id="submit-btn" onclick="kirimPost()">KIRIM DATA</button>
        <div class="footer-text">CREATED : NNDO</div>
      </div>

      <div class="box" style="margin-top: 20px;">
        <h2>POST HISTORY</h2>
        <div id="admin-post-list">
            <div class="footer-text">LOADING DATA...</div>
        </div>
      </div>

      <button class="btn-danger" style="max-width: 450px;" onclick="logout()">LOGOUT SYSTEM</button>
  </div>

  <script>
    // CONFIG FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBpa1Ml5i0j5Jzs4eQrHKKIuo3FoB7JWrE",
      authDomain: "clx---14.firebaseapp.com",
      databaseURL: "https://clx---14-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "clx---14",
      storageBucket: "clx---14.firebasestorage.app",
      messagingSenderId: "368765694470",
      appId: "1:368765694470:web:90ef6dbccc7aa5a4adc987"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    window.onload = function() {
        if(localStorage.getItem('admin261_logged_in') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'flex';
            loadAdminPosts(); 
        }
    };

    function login() {
      let u = document.getElementById('user').value;
      let p = document.getElementById('pass').value;
      let remember = document.getElementById('remember-me').checked;

      if(u === '261area' && p === 'parapetinggi261') {
        if(remember) localStorage.setItem('admin261_logged_in', 'true');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'flex';
        loadAdminPosts(); 
      } else {
        alert('ACCESS DENIED: Kredensial tidak valid!');
      }
    }

    function logout() {
        if(confirm("Yakin mau logout cuy?")) {
            localStorage.removeItem('admin261_logged_in');
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        }
    }

    // Sistem Tambah Opsi Polling
    let pollCount = 0;
    function addPollOption() {
        let div = document.createElement('div');
        div.innerHTML = `<input type="text" id="poll-opt-${pollCount}" placeholder="Opsi Polling ${pollCount + 1}" autocomplete="off">`;
        document.getElementById('poll-container').appendChild(div);
        pollCount++;
    }

    function loadAdminPosts() {
        database.ref('forum_posts').on('value', (snapshot) => {
            let html = '';
            let postsArray = [];
            
            snapshot.forEach(child => { postsArray.push({ key: child.key, ...child.val() }); });
            postsArray.sort((a, b) => b.timestamp - a.timestamp);

            postsArray.forEach(post => {
                let dateObj = new Date(post.timestamp);
                let dateStr = dateObj.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'}) + ' - ' + dateObj.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
                
                let pollInfo = post.poll ? `<div style="color:#0f0; margin-bottom:10px; font-weight:bold;">[📊 Polling Dilampirkan]</div>` : '';

                html += `
                <div class="admin-post-card">
                    <div class="date">[ ${dateStr} WIB ]</div>
                    ${post.image ? `<img src="${post.image}" class="post-preview-img">` : ''}
                    ${pollInfo}
                    <div class="text">${post.content ? post.content : ''}</div>
                    <button class="delete-btn" onclick="hapusPost('${post.key}')">DELETE PERMANENTLY</button>
                </div>`;
            });

            if(html === '') html = '<div class="footer-text">NO DATA IN DATABASE</div>';
            document.getElementById('admin-post-list').innerHTML = html;
        });
    }

    window.hapusPost = function(key) {
        if(confirm("WARNING: Yakin mau hapus data ini dari server 261 Area?")) {
            database.ref('forum_posts/' + key).remove()
            .then(() => alert("SUCCESS: Data terhapus permanen!"))
            .catch(e => alert("FAILED: " + e));
        }
    }

    let imageBase64 = "";
    document.getElementById('img-input').addEventListener('change', function(e) {
      let file = e.target.files[0];
      if(!file) return;
      let reader = new FileReader();
      reader.onload = function(event) {
        let img = new Image();
        img.onload = function() {
          let canvas = document.createElement('canvas');
          let MAX_WIDTH = 600; 
          let scaleSize = MAX_WIDTH / img.width;
          canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
          let ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          imageBase64 = canvas.toDataURL('image/jpeg', 0.6); 
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    function kirimPost() {
      let content = document.getElementById('post-content').value;
      
      // Kumpulin Data Polling
      let pollData = null;
      if(pollCount > 0) {
          let hasValidOption = false;
          pollData = {};
          for(let i=0; i<pollCount; i++) {
              let el = document.getElementById(`poll-opt-${i}`);
              if(el && el.value.trim() !== "") {
                  pollData[`opt_${i}`] = { text: el.value.trim(), votes: 0 };
                  hasValidOption = true;
              }
          }
          if(!hasValidOption) pollData = null;
      }

      if(!content && !imageBase64 && !pollData) return alert('ERROR: Masukin pesan, gambar, atau opsi polling dulu cuy!');

      let btn = document.getElementById('submit-btn');
      btn.innerText = "TRANSMITTING..."; btn.disabled = true;

      database.ref('forum_posts').push({
        content: content,
        image: imageBase64,
        poll: pollData,
        timestamp: Date.now() 
      }).then(() => {
        alert('SUCCESS: Data terkirim ke server 261 Area!');
        document.getElementById('post-content').value = '';
        document.getElementById('img-input').value = '';
        document.getElementById('poll-container').innerHTML = ''; // Reset Polling
        pollCount = 0;
        imageBase64 = '';
        btn.innerText = "TRANSMIT DATA"; btn.disabled = false;
      }).catch(e => {
        alert('FAILED: ' + e);
        btn.innerText = "TRANSMIT DATA"; btn.disabled = false;
      });
    }

    document.getElementById('pass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
